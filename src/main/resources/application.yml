server:
  port: 8080
  servlet:
    context-path: /api
logging:
  level:
    org.springdoc: DEBUG
    org.springframework.web: DEBUG
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC  # Note: typical MySQL port is 3306
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  cache :
    type : redis
  redis :
    host : ${REDIS_HOST}
    port : ${REDIS_PORT}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth : true
          starttls:
            enable : true
jwt:
  access_key: ${JWT_ACCESS_KEY}
  refresh_key : ${JWT_REFRESH_KEY}

ghn:
  token: ${GHN_TOKEN}
  shop : ${GHN_SHOP_ID}
  baseUrl : ${GHN_BASE_URL}

cloud:
  link : ${CLOUDINARY_LINK}

admin:
  email: ${ADMIN_EMAIL}
  password: ${ADMIN_PASSWORD}