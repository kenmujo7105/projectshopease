server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

  cache:
    type: none

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: test@gmail.com
    password: test-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  access_key: "dummy_test_jwt_access_key_must_be_very_long_so_hs512_works_perfectly_fine_in_unit_tests"
  refresh_key: "dummy_test_jwt_refresh_key_must_be_very_long_so_hs512_works_perfectly_fine_in_unit_tests"

ghn:
  token: "test-ghn-token"
  shop: "12345"
  baseUrl: "https://online-gateway.ghn.vn/shiip/public-api"

cloud:
  link: "cloudinary://test:test@test"

admin:
  email: "admin@gmail.com"
  password: "admin"

gemini:
  api:
    key: dummy_gemini_key          

groq:
  api:
    key: dummy_groq_key